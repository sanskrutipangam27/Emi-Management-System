<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login - EMI Manager</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:url('https://images.unsplash.com/photo-1559526324-4b87b5e36e44') no-repeat center center fixed;
background-size:cover;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:center;
align-items:center;
}

.form-box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:40px;
border-radius:15px;
width:400px;
color:white;
box-shadow:0 8px 32px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:25px;
color:#00e5ff;
}

.form-group{
margin-bottom:18px;
}

.form-group label{
display:block;
margin-bottom:6px;
font-size:14px;
}

.form-group input{
width:100%;
height:42px;
padding:0 12px;
border-radius:8px;
border:none;
outline:none;
font-size:14px;
background:rgba(255,255,255,0.9);
}

.btn-primary{
width:100%;
height:42px;
border:none;
border-radius:8px;
background:#00bcd4;
color:white;
font-weight:bold;
font-size:14px;
cursor:pointer;
transition:0.3s;
}

.btn-primary:hover{
background:#0097a7;
}

.error-message{
display:none;
background:rgba(255,0,0,0.7);
padding:8px;
border-radius:6px;
margin-bottom:15px;
text-align:center;
font-size:14px;
}

.text-center{
text-align:center;
margin-top:18px;
font-size:14px;
}

a{
color:#00e5ff;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}

.admin-badge{
display:inline-block;
background:rgba(0,188,212,0.3);
padding:4px 12px;
border-radius:20px;
font-size:12px;
margin-bottom:15px;
border:1px solid rgba(0,229,255,0.5);
}

</style>
</head>

<body>

<div class="overlay">

<div class="form-box">

<h2>Admin Login</h2>

<div class="admin-badge">
🔐 EMI Manager Admin Panel
</div>

<div id="error-message" class="error-message"></div>

<form id="adminLoginForm">

<div class="form-group">
<label>Admin Email</label>
<input type="email" id="adminEmail" placeholder="admin@emimanager.com" required>
</div>

<div class="form-group">
<label>Admin Password</label>
<input type="password" id="adminPassword" placeholder="Enter admin password" required>
</div>

<button type="submit" class="btn-primary">
Admin Login
</button>

</form>

<p class="text-center">
Back to <a href="index.html">User Login</a>
</p>

</div>

</div>

<script>

document.getElementById("adminLoginForm").addEventListener("submit", async function(e){

e.preventDefault();

const email = document.getElementById("adminEmail").value;
const password = document.getElementById("adminPassword").value;

const errorDiv = document.getElementById("error-message");

try{

const response = await fetch("http://localhost:3000/admin-login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

credentials:"include",

body:JSON.stringify({
email:email,
password:password
})

});

const data = await response.json();

console.log("LOGIN RESPONSE:",data);

if(data.success){

window.location.href="admin-dashboard.html";

}else{

errorDiv.textContent=data.error || "Invalid credentials";
errorDiv.style.display="block";

}

}catch(error){

errorDiv.textContent="Server error. Is Node server running?";
errorDiv.style.display="block";

console.error(error);

}

});

</script>

</body>
</html>
