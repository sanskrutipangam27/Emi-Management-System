<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - EMI Manager</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:url('https://images.unsplash.com/photo-1559526324-4b87b5e36e44') no-repeat center center fixed;
background-size:cover;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:center;
align-items:center;
}

.form-box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:40px;
border-radius:15px;
width:400px;
color:white;
box-shadow:0 8px 32px rgba(0,0,0,0.4);
}

h2{text-align:center;margin-bottom:25px;}

.form-group{margin-bottom:18px;}

.form-group label{
display:block;
margin-bottom:6px;
font-size:14px;
}

.form-group input{
width:100%;
height:42px;
padding:0 12px;
border-radius:8px;
border:none;
outline:none;
font-size:14px;
}

.btn-primary{
width:100%;
height:42px;
border:none;
border-radius:8px;
background:#00bcd4;
color:white;
font-weight:bold;
font-size:14px;
cursor:pointer;
}

.btn-primary:hover{background:#0097a7;}

.error-message{
display:none;
background:rgba(255,0,0,0.7);
padding:8px;
border-radius:6px;
margin-bottom:15px;
text-align:center;
font-size:14px;
}

.text-center{text-align:center;margin-top:18px;font-size:14px;}

a{color:#00e5ff;text-decoration:none;}
</style>
</head>

<body>

<div class="overlay">
<div class="form-box">

<h2>Create Account</h2>

<div id="error-message" class="error-message"></div>

<form id="registerForm">

<div class="form-group">
<label>Username</label>
<input type="text" id="username" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" minlength="6" required>
</div>

<div class="form-group">
<label>Confirm Password</label>
<input type="password" id="confirm_password" required>
</div>

<button type="submit" class="btn-primary">Register</button>

</form>

<p class="text-center">
Already have an account?
<a href="login.html">Login here</a>
</p>

</div>
</div>

<script>

document.getElementById("registerForm").addEventListener("submit",async(e)=>{

e.preventDefault();

const username=document.getElementById("username").value.trim();
const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();
const confirmPassword=document.getElementById("confirm_password").value.trim();

const errorDiv=document.getElementById("error-message");
errorDiv.style.display="none";

if(password!==confirmPassword){
errorDiv.textContent="Passwords do not match";
errorDiv.style.display="block";
return;
}

try{

const response=await fetch("http://localhost:3000/register",{

method:"POST",
headers:{ "Content-Type":"application/json" },
credentials:"include",

body:JSON.stringify({
username,
email,
password
})

});

const data=await response.json();

if(data.success){

alert("Registration successful!");
window.location.href="login.html";

}else{

errorDiv.textContent=data.error || "Registration failed";
errorDiv.style.display="block";

}

}catch(err){

errorDiv.textContent="Server error. Please try again.";
errorDiv.style.display="block";

}

});

</script>

</body>
</html>
